<script>
        AFRAME.registerComponent('touch-transform', {
            init: function () {
                const el = this.el;

                this.defaultScale = el.object3D.scale.x;
                this.currentScale = this.defaultScale;

                this.prevDistance = null;
                this.prevAngle = null;

                this.lastTap = 0;
                this.isTwoFingerGesture = false;

                const scene = el.sceneEl;

                scene.addEventListener('renderstart', () => {
                    const canvas = scene.canvas;

                    canvas.addEventListener('touchstart', (e) => {
                        if (e.touches.length === 2) {
                            this.isTwoFingerGesture = true;

                            const dx = e.touches[0].clientX - e.touches[1].clientX;
                            const dy = e.touches[0].clientY - e.touches[1].clientY;

                            this.prevDistance = Math.hypot(dx, dy);
                            this.prevAngle = Math.atan2(dy, dx);
                        }
                    }, { passive: false });

                    canvas.addEventListener('touchmove', (e) => {
                        if (e.touches.length === 2 && this.prevDistance !== null) {
                            const dx = e.touches[0].clientX - e.touches[1].clientX;
                            const dy = e.touches[0].clientY - e.touches[1].clientY;

                            const dist = Math.hypot(dx, dy);
                            const angle = Math.atan2(dy, dx);

                            const scaleChange = Math.abs(dist - this.prevDistance);
                            const rotateChange = Math.abs(angle - this.prevAngle);

                            // 👉 只縮放
                            if (scaleChange > rotateChange * 100) {
                                const scaleFactor = dist / this.prevDistance;

                                this.currentScale *= scaleFactor;
                                this.currentScale = Math.min(
                                    Math.max(this.currentScale, 0.5),
                                    3
                                );

                                el.object3D.scale.set(
                                    this.currentScale,
                                    this.currentScale,
                                    this.currentScale
                                );
                            }

                            // 👉 只旋轉
                            else {
                                const deltaAngle = angle - this.prevAngle;
                                const rot = el.object3D.rotation;

                                el.object3D.rotation.set(
                                    rot.x,
                                    rot.y,
                                    rot.z + deltaAngle
                                );
                            }

                            this.prevDistance = dist;
                            this.prevAngle = angle;

                            e.preventDefault();
                        }
                    }, { passive: false });

                    canvas.addEventListener('touchend', (e) => {
                        const now = Date.now();

                        // 重置雙指資料
                        if (e.touches.length < 2) {
                            this.prevDistance = null;
                            this.prevAngle = null;
                        }

                        // 👉 如果剛剛是雙指操作，就不要觸發雙擊
                        if (this.isTwoFingerGesture) {
                            if (e.touches.length === 0) {
                                setTimeout(() => {
                                    this.isTwoFingerGesture = false;
                                }, 250);
                            }
                            return;
                        }

                        // 👉 單指雙擊還原
                        if (e.changedTouches.length === 1 && e.touches.length === 0) {
                            if (now - this.lastTap < 300) {
                                el.object3D.scale.set(
                                    this.defaultScale,
                                    this.defaultScale,
                                    this.defaultScale
                                );

                                el.object3D.rotation.set(0, 0, 0);

                                this.currentScale = this.defaultScale;
                            }

                            this.lastTap = now;
                        }
                    }, { passive: false });
                });
            }
        });
    </script>

</body>
</html>
